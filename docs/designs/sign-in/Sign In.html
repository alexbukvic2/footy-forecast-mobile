<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footy Forecast — Sign In (V1 reference)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Mirror of tailwind.extend.js so this preview reads identically to
    // what the RN runtime will paint. Update both files together.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0E0B09',
            surface: { DEFAULT: '#181311', raised: '#231B17', sunken: '#0E0B09' },
            ink:     { DEFAULT: '#F5E8D2', muted: 'rgba(245,232,210,0.55)', dim: 'rgba(245,232,210,0.35)', invert: '#1A0E08' },
            line:    { DEFAULT: 'rgba(245,232,210,0.08)', strong: 'rgba(245,232,210,0.16)' },
            brand: {
              50:'#FBEDE5',100:'#F4D3C0',200:'#EDB497',300:'#E4906A',400:'#DC7B4F',
              500:'#D86B3D',600:'#B85530',700:'#8F4124',800:'#5F2B18',900:'#3B1A0E',
              soft: 'rgba(216,107,61,0.14)',
            },
            success: '#7FB069', warning: '#E8A14B', danger: '#D84A4A',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
          },
          fontSize: {
            eyebrow: ['10.5px', { lineHeight: '14px', letterSpacing: '1.6px' }],
            'hud-md': ['28px', { lineHeight: '30px', letterSpacing: '-0.6px' }],
            'hud-lg': ['40px', { lineHeight: '42px', letterSpacing: '-1.2px' }],
            'hud-xl': ['56px', { lineHeight: '56px', letterSpacing: '-2px' }],
          },
          borderRadius: { card: '18px', tab: '22px', pill: '999px' },
          spacing: { 'screen-x':'20px', 'screen-top':'54px', 'tab-h':'64px' },
          boxShadow: {
            card: '0 18px 40px rgba(0,0,0,0.45)',
            'card-sm': '0 8px 18px rgba(0,0,0,0.35)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #0E0B09; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #F5E8D2; }

    /* iPhone-ish bezel — simple enough that it doesn't need a component. */
    .bezel {
      width: 392px;
      height: 850px;
      border-radius: 56px;
      padding: 12px;
      background: #1a1a1a;
      box-shadow:
        inset 0 0 0 2px #2a2a2a,
        0 30px 80px rgba(0,0,0,0.6);
      position: relative;
    }
    .bezel::after { /* dynamic-island stand-in */
      content: '';
      position: absolute;
      top: 18px; left: 50%;
      width: 110px; height: 30px;
      background: #000;
      border-radius: 20px;
      transform: translateX(-50%);
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 44px;
      background: #0E0B09;
      overflow: hidden;
      position: relative;
    }
    /* status-bar safe area inside the screen */
    .screen-content { padding-top: 54px; }

    /* tick marks for the concentric badge */
    .tick {
      position: absolute;
      width: 2px; height: 7px;
      background: rgba(245,232,210,0.18);
      top: 50%; left: 50%;
      margin-left: -1px;
    }
  </style>

  <script type="module">
    import { tv } from 'https://esm.sh/tailwind-variants@0.2.1';
    window.tv = tv;
    window.__tvReady = true;
    window.dispatchEvent(new Event('tv-ready'));
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div style="padding: 80px 24px; color: rgba(245,232,210,0.55); font-family: 'JetBrains Mono', monospace; font-size: 12px;">Loading…</div>
  </div>

  <script type="text/babel">
    // Wait for tailwind-variants ESM module.
    function whenTVReady(cb) {
      if (window.__tvReady) return cb();
      window.addEventListener('tv-ready', cb, { once: true });
    }

    whenTVReady(() => {
      // Minimal Text + classname builder mirroring components/ui/Text.tsx.
      const text = window.tv({
        base: 'text-ink',
        variants: {
          variant: {
            title:   'font-sans text-2xl font-semibold tracking-tight',
            body:    'font-sans text-base',
            caption: 'font-sans text-sm',
          },
          tone: {
            default: 'text-ink',
            muted:   'text-ink-muted',
            dim:     'text-ink-dim',
            brand:   'text-brand-500',
          },
          align: { left: 'text-left', center: 'text-center', right: 'text-right' },
        },
        defaultVariants: { variant: 'body' },
      });
      const Text = ({ variant, tone, align, className = '', as: Tag = 'span', children, ...rest }) =>
        <Tag className={text({ variant, tone, align, class: className })} {...rest}>{children}</Tag>;

      // ── V1 atoms — mirror docs/designs/sign-in/sign-in.tsx ─────────
      const Wordmark = () => (
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-card bg-brand-500 grid place-items-center">
            <span className="font-display font-bold text-ink-invert text-[13px]">FF</span>
          </div>
          <div className="flex flex-col leading-[1.05]">
            <span className="font-display font-bold text-sm tracking-tight">Footy Forecast</span>
            <span className="font-mono uppercase text-ink-dim tracking-[0.18em] text-[9px]">World Cup '26 · beta</span>
          </div>
        </div>
      );

      const GoogleG = ({ size = 20 }) => (
        <svg width={size} height={size} viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.3 0-9.7-3.4-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C40.9 35.7 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/>
        </svg>
      );

      const GoogleSignInButton = () => (
        <button className="w-full h-14 rounded-pill bg-white hover:bg-white/95 active:bg-white/90 flex items-center justify-center gap-3 shadow-card-sm transition">
          <GoogleG size={20} />
          <span className="font-sans font-semibold text-[15px]" style={{ color: '#1A1A1A' }}>Continue with Google</span>
        </button>
      );

      const Legal = () => (
        <p className="text-[11px] leading-relaxed text-ink-dim text-center max-w-[280px] mx-auto">
          By continuing you agree to our{' '}
          <span className="text-ink-muted underline decoration-line">Terms</span>
          {' '}and{' '}
          <span className="text-ink-muted underline decoration-line">Privacy Policy</span>.
        </p>
      );

      const ConcentricBadge = () => (
        <div className="relative mb-10" style={{ width: 168, height: 168 }}>
          <div className="absolute inset-0 rounded-pill border border-line" />
          <div className="absolute inset-4 rounded-pill border border-line-strong" />
          <div className="absolute inset-10 rounded-pill bg-brand-500 grid place-items-center shadow-card">
            <span className="font-display font-bold text-hud-lg text-ink-invert tracking-tight">FF</span>
          </div>
          {Array.from({ length: 12 }).map((_, i) => (
            <span
              key={i}
              className="tick"
              style={{ transform: `rotate(${i * 30}deg) translateY(-76px)`, transformOrigin: 'center top' }}
            />
          ))}
        </div>
      );

      // Top warm glow — linear (mirrors the swap from radial in sign-in.tsx)
      const WarmTopGlow = () => (
        <div
          className="absolute top-0 left-0 right-0 pointer-events-none"
          style={{
            height: 420,
            background: 'linear-gradient(180deg, rgba(216,107,61,0.18) 0%, rgba(216,107,61,0) 100%)',
          }}
        />
      );

      // ── Screen ────────────────────────────────────────────────────
      const SignInScreen = () => (
        <div className="screen flex flex-col">
          <WarmTopGlow />
          <div className="screen-content flex flex-col flex-1">
            <div className="px-5 pt-3 flex justify-center">
              <Wordmark />
            </div>

            <div className="flex-1 flex flex-col items-center justify-center px-6 relative">
              <ConcentricBadge />
              <Text variant="title" align="center" className="block">Predict every match.</Text>
              <Text variant="title" tone="brand" align="center" className="block">Beat your friends.</Text>
              <Text variant="body" tone="muted" align="center" className="block mt-4 max-w-[260px]">
                48 teams. 104 matches. One leaderboard between you and bragging rights.
              </Text>
            </div>

            <div className="px-5 pb-10 space-y-5">
              <GoogleSignInButton />
              <Legal />
            </div>
          </div>
        </div>
      );

      // ── Page ──────────────────────────────────────────────────────
      const App = () => (
        <div className="min-h-screen flex items-center justify-center px-10 py-16 gap-12 flex-wrap">
          <div className="bezel">
            <SignInScreen />
          </div>

          <aside className="max-w-sm space-y-6">
            <div>
              <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest mb-2">
                sign in · v1
              </div>
              <h1 className="font-display text-3xl font-bold tracking-tight mb-3">Quiet centered</h1>
              <p className="text-ink-muted text-sm leading-relaxed">
                Single screen, one CTA. Wordmark top, concentric brand badge as a calm focal point,
                tagline, Google SSO, legal. No distractions, no in-between steps.
              </p>
            </div>

            <div className="border-t border-line pt-5 space-y-3 text-sm text-ink-muted leading-relaxed">
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">backdrop —</span> top-down linear glow via <code className="font-mono text-ink">expo-linear-gradient</code>. Approximates the original radial without dragging SVG in just for a gradient.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">google g —</span> inline SVG via <code className="font-mono text-ink">react-native-svg</code>. Already a peer dep of <code className="font-mono text-ink">lucide-react-native</code>; no new install.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">badge —</span> pure RN Views (rings + tick marks via <code className="font-mono text-ink">transform: rotate</code>). Zero icon libraries.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">safe area —</span> <code className="font-mono text-ink">SafeAreaView</code> from <code className="font-mono text-ink">react-native-safe-area-context</code>, edges on all four sides — auth screens often live outside the tabs frame.</p>
            </div>

            <div className="border-t border-line pt-5">
              <div className="font-mono text-eyebrow uppercase text-ink-muted tracking-widest mb-2">Files</div>
              <ul className="text-sm text-ink-muted space-y-1 font-mono">
                <li><code className="text-ink">sign-in.tsx</code> · production reference</li>
                <li><code className="text-ink">Sign In.html</code> · this preview</li>
                <li><code className="text-ink">tailwind.extend.js</code> · token diff</li>
                <li><code className="text-ink">README.md</code> · rationale & deps</li>
              </ul>
            </div>
          </aside>
        </div>
      );

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    });
  </script>
</body>
</html>
