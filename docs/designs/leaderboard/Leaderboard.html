<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footy Forecast — Leaderboard (table)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Mirror of Sign In.html / Leagues.html — keep in sync.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0E0B09',
            surface: { DEFAULT: '#181311', raised: '#231B17', sunken: '#0E0B09' },
            ink:     { DEFAULT: '#F5E8D2', muted: 'rgba(245,232,210,0.55)', dim: 'rgba(245,232,210,0.35)', invert: '#1A0E08' },
            line:    { DEFAULT: 'rgba(245,232,210,0.08)', strong: 'rgba(245,232,210,0.16)' },
            brand: {
              50:'#FBEDE5',100:'#F4D3C0',200:'#EDB497',300:'#E4906A',400:'#DC7B4F',
              500:'#D86B3D',600:'#B85530',700:'#8F4124',800:'#5F2B18',900:'#3B1A0E',
              soft: 'rgba(216,107,61,0.14)',
            },
            success: '#7FB069', warning: '#E8A14B', danger: '#D84A4A',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
          },
          fontSize: {
            eyebrow: ['10.5px', { lineHeight: '14px', letterSpacing: '1.6px' }],
            'hud-md': ['28px', { lineHeight: '30px', letterSpacing: '-0.6px' }],
            'hud-lg': ['40px', { lineHeight: '42px', letterSpacing: '-1.2px' }],
            'hud-xl': ['56px', { lineHeight: '56px', letterSpacing: '-2px' }],
          },
          borderRadius: { card: '18px', tab: '22px', pill: '999px' },
          spacing: { 'screen-x':'20px', 'screen-top':'54px', 'tab-h':'64px' },
          boxShadow: {
            card: '0 18px 40px rgba(0,0,0,0.45)',
            'card-sm': '0 8px 18px rgba(0,0,0,0.35)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #0E0B09; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #F5E8D2; }

    /* iPhone-ish bezel (matches Sign In.html / Leagues.html) */
    .bezel {
      width: 392px;
      height: 850px;
      border-radius: 56px;
      padding: 12px;
      background: #1a1a1a;
      box-shadow:
        inset 0 0 0 2px #2a2a2a,
        0 30px 80px rgba(0,0,0,0.6);
      position: relative;
    }
    .bezel::after {
      content: '';
      position: absolute;
      top: 18px; left: 50%;
      width: 110px; height: 30px;
      background: #000;
      border-radius: 20px;
      transform: translateX(-50%);
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 44px;
      background: #0E0B09;
      overflow: hidden;
      position: relative;
    }
    .screen-content { padding-top: 54px; }

    .tnum { font-variant-numeric: tabular-nums; }

    /* Hide scrollbars on the table scroller */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Row press affordance */
    .lb-row { transition: background-color 120ms ease; }
    .lb-row:active { background-color: rgba(245,232,210,0.04); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div style="padding: 80px 24px; color: rgba(245,232,210,0.55); font-family: 'JetBrains Mono', monospace; font-size: 12px;">Loading…</div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ── Brand atoms (lifted from Sign In.html / Leagues.html) ─────────────
    const Wordmark = () => (
      <div className="flex items-center gap-2.5">
        <div className="rounded-card bg-brand-500 grid place-items-center" style={{ width: 26, height: 26 }}>
          <span className="font-display font-bold text-ink-invert" style={{ fontSize: 11 }}>FF</span>
        </div>
        <div className="flex flex-col leading-[1.05]">
          <span className="font-display font-bold tracking-tight text-[11px]">Footy Forecast</span>
          <span className="font-mono uppercase text-ink-dim tracking-[0.18em] text-[9px]">World Cup '26 · beta</span>
        </div>
      </div>
    );

    const WarmTopGlow = () => (
      <div className="absolute top-0 left-0 right-0 pointer-events-none"
        style={{ height: 380, background: 'linear-gradient(180deg, rgba(216,107,61,0.18) 0%, rgba(216,107,61,0) 100%)' }} />
    );

    /**
     * Position trend — small filled triangle in success/danger, neutral dot
     * on hold. Tiny because it shares a row with 7+ numeric columns; carries
     * meaning by color before anything else.
     */
    const TrendChip = ({ change }) => {
      if (change > 0) {
        return (
          <span className="inline-flex items-center gap-0.5 font-mono text-[10px] tnum" style={{ color: '#7FB069' }}>
            <svg width="7" height="7" viewBox="0 0 10 10"><path d="M5 1l4 7H1z" fill="currentColor"/></svg>
            {change}
          </span>
        );
      }
      if (change < 0) {
        return (
          <span className="inline-flex items-center gap-0.5 font-mono text-[10px] tnum" style={{ color: '#D84A4A' }}>
            <svg width="7" height="7" viewBox="0 0 10 10"><path d="M5 9L1 2h8z" fill="currentColor"/></svg>
            {Math.abs(change)}
          </span>
        );
      }
      return (
        <span className="inline-flex items-center" aria-label="held">
          <svg width="7" height="7" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3" fill="rgba(245,232,210,0.4)"/></svg>
        </span>
      );
    };

    // ── Data ──────────────────────────────────────────────────────────────
    // M  matches predicted    GS group-stage pts     GW group-winner pts
    // KO knockout pts         SF semifinal pts       GB golden boot
    // CH champion pts         PTS total
    const ROSTER = [
      { rank: 1,  prev: 1,  name: 'Marco Vivaldi',  M: 24, GS: 38, GW: 12, KO:  9, SF:  6, GB:  4, CH:  8, PTS: 109 },
      { rank: 2,  prev: 4,  name: 'Priya Khatri',   M: 24, GS: 36, GW: 10, KO: 11, SF:  6, GB:  3, CH:  8, PTS: 102 },
      { rank: 3,  prev: 2,  name: 'Theo Andersen',  M: 24, GS: 35, GW:  9, KO: 10, SF:  6, GB:  4, CH:  4, PTS:  98 },
      { rank: 4,  prev: 3,  name: 'Yusuf Demir',    M: 24, GS: 34, GW:  9, KO:  9, SF:  6, GB:  4, CH:  4, PTS:  94 },
      { rank: 5,  prev: 7,  name: 'You (Alex M.)',  M: 24, GS: 32, GW: 10, KO:  8, SF:  3, GB:  4, CH:  8, PTS:  91, you: true },
      { rank: 6,  prev: 5,  name: 'Camille Roux',   M: 24, GS: 31, GW:  8, KO:  9, SF:  6, GB:  0, CH:  4, PTS:  88 },
      { rank: 7,  prev: 6,  name: 'Sofia Maradona', M: 24, GS: 30, GW:  9, KO:  8, SF:  3, GB:  4, CH:  4, PTS:  84 },
      { rank: 8,  prev: 8,  name: 'Olu Adeyemi',    M: 23, GS: 28, GW:  8, KO:  8, SF:  6, GB:  0, CH:  4, PTS:  80 },
      { rank: 9,  prev: 11, name: 'Jin Park',       M: 24, GS: 27, GW:  7, KO:  8, SF:  3, GB:  4, CH:  4, PTS:  77 },
      { rank: 10, prev: 9,  name: 'Marta Esposito', M: 24, GS: 26, GW:  7, KO:  7, SF:  3, GB:  4, CH:  0, PTS:  71 },
      { rank: 11, prev: 10, name: 'Ben Whitaker',   M: 22, GS: 24, GW:  6, KO:  7, SF:  3, GB:  0, CH:  4, PTS:  66 },
      { rank: 12, prev: 12, name: 'Hannah Lim',     M: 21, GS: 22, GW:  5, KO:  5, SF:  0, GB:  4, CH:  0, PTS:  54 },
    ];

    const NUMERIC = ['M','GS','GW','KO','SF','GB','CH'];
    // Single source of truth for column widths — mirrored in grid template.
    const GRID = '18px 1fr repeat(7, 22px) 34px';

    // ── Pieces ────────────────────────────────────────────────────────────
    const HeaderRow = () => (
      <div className="px-3 sticky top-0 z-10"
           style={{ background: 'linear-gradient(180deg,#0E0B09 60%,rgba(14,11,9,0))' }}>
        <div className="grid items-center gap-1 py-2 border-b border-line"
             style={{ gridTemplateColumns: GRID }}>
          <div />
          <div className="font-mono text-[9px] uppercase tracking-[0.18em] text-ink-dim pl-1">PLAYER</div>
          {NUMERIC.map((c) => (
            <div key={c}
                 className="font-mono text-[9px] uppercase text-ink-dim text-center tracking-[0.08em]">
              {c}
            </div>
          ))}
          <div className="font-mono text-[9px] uppercase tracking-[0.12em] text-brand-500 text-right pr-1">PTS</div>
        </div>
      </div>
    );

    const PlayerRow = ({ r, onPress }) => {
      const change = r.prev - r.rank;
      const isYou = !!r.you;
      return (
        <button
          type="button"
          onClick={() => onPress?.(r)}
          className="lb-row w-full text-left grid items-center gap-1 py-2.5 border-b border-line/60"
          style={{
            gridTemplateColumns: GRID,
            background: isYou ? 'rgba(216,107,61,0.10)' : 'transparent',
            borderRadius: isYou ? 10 : 0,
            marginLeft: isYou ? -6 : 0,
            marginRight: isYou ? -6 : 0,
            paddingLeft: isYou ? 6 : 0,
            paddingRight: isYou ? 6 : 0,
          }}
        >
          {/* rank */}
          <div className="font-mono text-[11px] tnum text-ink-dim text-right pr-0.5">{r.rank}</div>

          {/* name + trend */}
          <div className="min-w-0 flex items-center gap-1.5 pl-1">
            <span className={`font-sans truncate text-[13px] ${isYou ? 'font-semibold text-ink' : 'text-ink/90'}`}>
              {r.name}
            </span>
            <TrendChip change={change} />
          </div>

          {/* numeric cells */}
          {NUMERIC.map((c) => (
            <div key={c} className="font-mono text-[11px] tnum text-ink-muted text-center">{r[c]}</div>
          ))}

          {/* PTS */}
          <div className={`font-mono tnum text-right pr-1 text-[14px] ${isYou ? 'text-brand-400 font-semibold' : 'text-ink font-medium'}`}>
            {r.PTS}
          </div>
        </button>
      );
    };

    // ── Screen ────────────────────────────────────────────────────────────
    const LeaderboardScreen = ({ roster, onOpenPlayer }) => (
      <div className="screen flex flex-col">
        <WarmTopGlow />
        <div className="screen-content flex flex-col flex-1 relative">
          {/* Top bar */}
          <div className="px-5 pt-3 flex items-center justify-between">
            <Wordmark />
            <div className="font-mono text-[9px] uppercase tracking-[0.18em] text-ink-dim">md 8 · live</div>
          </div>

          {/* Hero */}
          <div className="px-5 pt-7">
            <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest">
              GROUP CHAT UNITED · TABLE
            </div>
            <h1 className="mt-1.5 font-display font-bold text-ink leading-[1.02] tracking-tight"
                style={{ fontSize: 30 }}>
              Standings <span className="text-brand-500">·</span> wk 04
            </h1>
            <p className="mt-1.5 font-mono text-[11px] uppercase tracking-[0.14em] text-ink-muted">
              {roster.length} players · updated 2 min ago
            </p>
          </div>

          {/* Table */}
          <div className="flex-1 mt-5 overflow-y-auto no-scrollbar">
            <HeaderRow />
            <div className="px-3 pb-6">
              {roster.map((r) => (
                <PlayerRow key={r.rank} r={r} onPress={onOpenPlayer} />
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // ── App ───────────────────────────────────────────────────────────────
    const App = () => (
      <div className="min-h-screen flex items-center justify-center px-10 py-16 gap-12 flex-wrap">
        <div className="bezel">
          <LeaderboardScreen
            roster={ROSTER}
            onOpenPlayer={(_p) => { /* → /leagues/[id]/player/[playerId] */ }}
          />
        </div>

        <aside className="max-w-sm space-y-6">
          <div>
            <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest mb-2">
              leaderboard · table
            </div>
            <p className="text-ink-muted text-sm leading-relaxed">
              The league's full standings table. Player on the left, the seven
              scoring categories in mono numerals, total points in brand color
              on the right. Your row gets a terracotta tint and brand-colored
              PTS so you find yourself instantly on scroll. Tap a row to open
              that player's prediction sheet.
            </p>
          </div>

          <div className="border-t border-line pt-5 space-y-3 text-sm text-ink-muted leading-relaxed">
            <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">columns —</span>
              <code className="font-mono text-ink"> M</code> matches played ·
              <code className="font-mono text-ink"> GS</code> group-stage pts ·
              <code className="font-mono text-ink"> GW</code> group-winner ·
              <code className="font-mono text-ink"> KO</code> round-of-16 ·
              <code className="font-mono text-ink"> SF</code> semis ·
              <code className="font-mono text-ink"> GB</code> golden boot ·
              <code className="font-mono text-ink"> CH</code> champion ·
              <code className="font-mono text-ink"> PTS</code> total.
            </p>
            <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">trend chip —</span> <code className="font-mono text-ink">▲ n</code> climbed, <code className="font-mono text-ink">▼ n</code> dropped, neutral dot held. Color carries meaning so it scans before the number does.</p>
            <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">you row —</span> terracotta tint + brand-colored PTS. Negative margins on the inner padding so the tinted pill bleeds into the row's edge padding without breaking the column grid.</p>
            <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">grid —</span> single <code className="font-mono text-ink">GRID</code> template string shared between header and row to keep the columns locked in alignment regardless of content width.</p>
          </div>

          <div className="border-t border-line pt-5">
            <div className="font-mono text-eyebrow uppercase text-ink-muted tracking-widest mb-2">RN parity</div>
            <ul className="text-sm text-ink-muted space-y-1 font-mono">
              <li><code className="text-ink">Screen</code> · <span className="text-ink-dim">scroll=true, padded=false</span></li>
              <li><code className="text-ink">Pressable</code> · <span className="text-ink-dim">whole row tappable</span></li>
              <li><code className="text-ink">Text variant="mono"</code> · <span className="text-ink-dim">all numerals (tabular-nums via mono family)</span></li>
              <li><code className="text-ink">FlatList</code> · <span className="text-ink-dim">windowed when roster &gt; ~30 (not in this preview)</span></li>
            </ul>
          </div>
        </aside>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
