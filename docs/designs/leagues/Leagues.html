<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footy Forecast — Leagues (roster)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Mirror of Sign In.html — keep in sync.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0E0B09',
            surface: { DEFAULT: '#181311', raised: '#231B17', sunken: '#0E0B09' },
            ink:     { DEFAULT: '#F5E8D2', muted: 'rgba(245,232,210,0.55)', dim: 'rgba(245,232,210,0.35)', invert: '#1A0E08' },
            line:    { DEFAULT: 'rgba(245,232,210,0.08)', strong: 'rgba(245,232,210,0.16)' },
            brand: {
              50:'#FBEDE5',100:'#F4D3C0',200:'#EDB497',300:'#E4906A',400:'#DC7B4F',
              500:'#D86B3D',600:'#B85530',700:'#8F4124',800:'#5F2B18',900:'#3B1A0E',
              soft: 'rgba(216,107,61,0.14)',
            },
            success: '#7FB069', warning: '#E8A14B', danger: '#D84A4A',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
          },
          fontSize: {
            eyebrow: ['10.5px', { lineHeight: '14px', letterSpacing: '1.6px' }],
            'hud-md': ['28px', { lineHeight: '30px', letterSpacing: '-0.6px' }],
            'hud-lg': ['40px', { lineHeight: '42px', letterSpacing: '-1.2px' }],
            'hud-xl': ['56px', { lineHeight: '56px', letterSpacing: '-2px' }],
          },
          borderRadius: { card: '18px', tab: '22px', pill: '999px' },
          spacing: { 'screen-x':'20px', 'screen-top':'54px', 'tab-h':'64px' },
          boxShadow: {
            card: '0 18px 40px rgba(0,0,0,0.45)',
            'card-sm': '0 8px 18px rgba(0,0,0,0.35)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #0E0B09; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #F5E8D2; }

    /* iPhone-ish bezel (matches Sign In.html) */
    .bezel {
      width: 392px;
      height: 850px;
      border-radius: 56px;
      padding: 12px;
      background: #1a1a1a;
      box-shadow:
        inset 0 0 0 2px #2a2a2a,
        0 30px 80px rgba(0,0,0,0.6);
      position: relative;
    }
    .bezel::after {
      content: '';
      position: absolute;
      top: 18px; left: 50%;
      width: 110px; height: 30px;
      background: #000;
      border-radius: 20px;
      transform: translateX(-50%);
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 44px;
      background: #0E0B09;
      overflow: hidden;
      position: relative;
    }
    .screen-content { padding-top: 54px; }

    /* Modal */
    @keyframes modalBackdropIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalCardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    .modal-backdrop { animation: modalBackdropIn 160ms ease forwards; }
    .modal-card     { animation: modalCardIn 200ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }

    /* Row press */
    .league-row { transition: background-color 120ms ease, border-color 120ms ease; }
    .league-row:active { background-color: rgba(245,232,210,0.04); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div style="padding: 80px 24px; color: rgba(245,232,210,0.55); font-family: 'JetBrains Mono', monospace; font-size: 12px;">Loading…</div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ── Brand atoms (lifted from Sign In.html) ───────────────────────────
    const Wordmark = ({ size = 'sm' }) => {
      const s = size === 'lg' ? { box: 44, txt: 18, wm: 'text-xl' }
              : size === 'sm' ? { box: 26, txt: 11, wm: 'text-[11px]' }
              :                  { box: 32, txt: 13, wm: 'text-sm' };
      return (
        <div className="flex items-center gap-2.5">
          <div className="rounded-card bg-brand-500 grid place-items-center" style={{ width: s.box, height: s.box }}>
            <span className="font-display font-bold text-ink-invert" style={{ fontSize: s.txt }}>FF</span>
          </div>
          <div className="flex flex-col leading-[1.05]">
            <span className={`font-display font-bold tracking-tight ${s.wm}`}>Footy Forecast</span>
            <span className="font-mono uppercase text-ink-dim tracking-[0.18em] text-[9px]">World Cup '26 · beta</span>
          </div>
        </div>
      );
    };

    const WarmTopGlow = () => (
      <div className="absolute top-0 left-0 right-0 pointer-events-none"
        style={{ height: 420, background: 'linear-gradient(180deg, rgba(216,107,61,0.18) 0%, rgba(216,107,61,0) 100%)' }} />
    );

    const PrimaryButton = ({ children, onClick, disabled }) => (
      <button
        type="button"
        onClick={onClick}
        disabled={disabled}
        className={`w-full h-14 rounded-pill bg-brand-500 hover:bg-brand-400 active:bg-brand-600
                    flex items-center justify-center gap-2.5 transition shadow-card-sm
                    ${disabled ? 'opacity-40' : ''}`}
      >
        <span className="font-sans font-semibold text-[15px] text-ink-invert">{children}</span>
      </button>
    );

    const SecondaryButton = ({ children, onClick }) => (
      <button
        type="button"
        onClick={onClick}
        className="w-full h-14 rounded-pill bg-surface-raised border border-line
                   hover:bg-surface active:opacity-90 flex items-center justify-center gap-2 transition"
      >
        <span className="font-sans font-semibold text-[15px] text-ink">{children}</span>
      </button>
    );

    // ── Roster data ──────────────────────────────────────────────────────
    // `change` = position delta since the last table update. Positive means
    // climbed, negative means dropped, 0 means held.
    const SEED_LEAGUES = [
      { id: 'l1', name: 'Group Chat United', code: 'WC26GB', members: 14, position: 3,  change:  2, isAdmin: true  },
      { id: 'l2', name: 'Q3 Sales Floor',    code: 'OFFICE', members: 23, position: 11, change: -1, isAdmin: false },
      { id: 'l3', name: 'The Pub Pool',      code: 'PUBSEV', members: 8,  position: 1,  change:  0, isAdmin: true  },
    ];

    // 1 → 1st, 2 → 2nd, 3 → 3rd, 11 → 11th, 21 → 21st …
    function ordinal(n) {
      const s = ['th', 'st', 'nd', 'rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    // ── Confirmation modal ──────────────────────────────────────────────
    const ConfirmModal = ({
      open, eyebrow, title, body, confirmLabel, onConfirm, onCancel, danger = true,
    }) => {
      useEffect(() => {
        if (!open) return;
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onCancel?.(); };
        window.addEventListener('keydown', onKey);
        return () => {
          document.body.style.overflow = prev;
          window.removeEventListener('keydown', onKey);
        };
      }, [open, onCancel]);

      if (!open) return null;
      return (
        <div className="absolute inset-0 z-50 flex items-end justify-center">
          <div
            className="modal-backdrop absolute inset-0"
            style={{ background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(2px)' }}
            onClick={onCancel}
          />
          <div className="modal-card relative w-full mx-3 mb-3 rounded-card bg-surface-raised border border-line-strong shadow-card overflow-hidden">
            <div className="px-5 pt-5 pb-4">
              <div className="flex items-center gap-2">
                <span className={`w-1.5 h-1.5 rounded-full ${danger ? 'bg-danger' : 'bg-brand-500'}`} />
                <span
                  className="font-mono text-eyebrow uppercase tracking-widest"
                  style={{ color: danger ? '#D84A4A' : '#D86B3D' }}
                >
                  {eyebrow}
                </span>
              </div>
              <h2 className="mt-2 font-display font-bold leading-[1.05] tracking-tight text-ink"
                  style={{ fontSize: 24, textWrap: 'pretty' }}>
                {title}
              </h2>
              <p className="mt-2 text-[13.5px] leading-relaxed text-ink-muted" style={{ textWrap: 'pretty' }}>
                {body}
              </p>
            </div>
            <div className="px-3 pb-3 pt-1 grid grid-cols-1 gap-2">
              <button
                type="button"
                onClick={onConfirm}
                className={`w-full h-12 rounded-pill flex items-center justify-center transition
                            ${danger
                              ? 'bg-danger hover:opacity-90 active:opacity-95'
                              : 'bg-brand-500 hover:bg-brand-400 active:bg-brand-600'}`}
              >
                <span className="font-sans font-semibold text-[14.5px] text-ink">{confirmLabel}</span>
              </button>
              <button
                type="button"
                onClick={onCancel}
                className="w-full h-12 rounded-pill bg-transparent border border-line hover:bg-surface active:opacity-90 flex items-center justify-center transition"
              >
                <span className="font-sans font-semibold text-[14.5px] text-ink">Cancel</span>
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ── Row primitives ───────────────────────────────────────────────────
    const AdminTag = () => (
      <span className="inline-flex items-center h-5 px-1.5 rounded
                       bg-brand-soft border border-brand-500/30
                       font-mono text-[9px] uppercase tracking-[0.18em] text-brand-500">
        admin
      </span>
    );

    /**
     * Position + trend indicator. Semantic color carries the meaning so
     * the row scans at a glance: green up, danger down, muted hold.
     * The arrow is a tiny filled triangle (SVG, no glyph) so the metric
     * line keeps mono rhythm.
     */
    const TrendChip = ({ change }) => {
      if (change > 0) {
        return (
          <span className="inline-flex items-center gap-1 font-mono text-[11px] tracking-[0.04em]"
                style={{ color: '#7FB069' }}>
            <svg width="8" height="8" viewBox="0 0 10 10"><path d="M5 1l4 7H1z" fill="currentColor"/></svg>
            {change}
          </span>
        );
      }
      if (change < 0) {
        return (
          <span className="inline-flex items-center gap-1 font-mono text-[11px] tracking-[0.04em]"
                style={{ color: '#D84A4A' }}>
            <svg width="8" height="8" viewBox="0 0 10 10"><path d="M5 9L1 2h8z" fill="currentColor"/></svg>
            {Math.abs(change)}
          </span>
        );
      }
      return (
        <span className="inline-flex items-center" aria-label="position unchanged">
          <svg width="8" height="8" viewBox="0 0 10 10">
            <circle cx="5" cy="5" r="3.5" fill="#5E9CD8"/>
          </svg>
        </span>
      );
    };

    const LeagueRow = ({ league, onOpen, onDelete }) => (
      <div className="league-row rounded-card border border-line bg-surface/40 px-4 py-3.5
                      flex items-center gap-3">
        <button
          type="button"
          onClick={() => onOpen(league)}
          className="flex-1 min-w-0 text-left"
        >
          <div className="flex items-center gap-2 min-w-0">
            <h3 className="font-display font-bold text-[17px] leading-tight text-ink truncate">
              {league.name}
            </h3>
            {league.isAdmin ? <AdminTag /> : null}
          </div>
          <div className="mt-1 flex items-center gap-2.5 font-mono text-[11px] uppercase tracking-[0.12em] text-ink-dim">
            <span className="tabular-nums text-ink-muted">
              {ordinal(league.position)} <span className="text-ink-dim">of {league.members}</span>
            </span>
            <span className="text-ink/20">·</span>
            <TrendChip change={league.change} />
          </div>
        </button>

        {league.isAdmin ? (
          <button
            type="button"
            onClick={(e) => { e.stopPropagation(); onDelete(league); }}
            aria-label={`Delete ${league.name}`}
            className="w-9 h-9 rounded-pill border border-line text-ink-muted
                       hover:bg-danger/10 hover:border-danger/40 hover:text-danger
                       active:opacity-80 grid place-items-center transition"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
            </svg>
          </button>
        ) : null}
      </div>
    );

    // ── List screen ──────────────────────────────────────────────────────
    const ListScreen = ({ leagues, onCreate, onJoin, onDelete, onOpen }) => (
      <div className="screen flex flex-col">
        <WarmTopGlow />
        <div className="screen-content flex flex-col flex-1 relative">
          {/* Hero */}
          <div className="px-6 pt-9">
            <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest">
              MY LEAGUES
            </div>
          </div>

          {/* Roster */}
          <div className="flex-1 px-5 pt-7 pb-3 overflow-y-auto space-y-2.5">
            {leagues.map((l) => (
              <LeagueRow key={l.id} league={l} onOpen={onOpen} onDelete={onDelete} />
            ))}
            {leagues.length === 0 ? (
              <div className="mt-2 rounded-card border border-dashed border-line p-6 text-center">
                <div className="font-mono text-eyebrow uppercase text-ink-dim mb-2">ROSTER · EMPTY</div>
                <div className="text-[13px] text-ink-muted">
                  Nothing here. Start one, or jump into a friend's pool.
                </div>
              </div>
            ) : null}
          </div>

          {/* CTAs */}
          <div className="px-5 pb-8 pt-1 space-y-3">
            <PrimaryButton onClick={onCreate}>Create new league</PrimaryButton>
            <SecondaryButton onClick={onJoin}>Join with code</SecondaryButton>
          </div>
        </div>
      </div>
    );

    // ── Phone (state owner) ──────────────────────────────────────────────
    function Phone() {
      const [leagues, setLeagues] = useState(SEED_LEAGUES);
      const [pendingDelete, setPendingDelete] = useState(null);

      const confirmDelete = () => {
        if (!pendingDelete) return;
        setLeagues((prev) => prev.filter((l) => l.id !== pendingDelete.id));
        setPendingDelete(null);
      };

      return (
        <div className="w-full h-full relative">
          <ListScreen
            leagues={leagues}
            onCreate={() => { /* → /leagues/create */ }}
            onJoin={()   => { /* → /leagues/join   */ }}
            onDelete={(l) => setPendingDelete(l)}
            onOpen={(_l)  => { /* → /(tabs)/today scoped to league */ }}
          />
          <ConfirmModal
            open={!!pendingDelete}
            eyebrow="DELETE LEAGUE · CONFIRM"
            title={pendingDelete ? `Disband ${pendingDelete.name}?` : ''}
            body={pendingDelete
              ? `This wipes the league for all ${pendingDelete.members} members and erases every prediction. Can't be undone.`
              : ''}
            confirmLabel="Delete league"
            onConfirm={confirmDelete}
            onCancel={() => setPendingDelete(null)}
          />
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────
    const App = () => {
      return (
        <div className="min-h-screen flex items-center justify-center px-10 py-16 gap-12 flex-wrap">
          <div className="bezel">
            <Phone />
          </div>

          <aside className="max-w-sm space-y-6">
            <div>
              <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest mb-2">
                leagues · roster
              </div>
              <p className="text-ink-muted text-sm leading-relaxed">
                The tabs-resident leagues screen. Each row shows the user's
                current position in that league and the direction of their
                last move on the table — green up, danger down, blue dot for
                held. Admin rows surface a trash affordance that opens a
                stacked confirm. CTAs at the bottom route to Create / Join.
              </p>
            </div>

            <div className="border-t border-line pt-5 space-y-3 text-sm text-ink-muted leading-relaxed">
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">trend chip —</span> <code className="font-mono text-ink">▲ n</code> for climbed (success), <code className="font-mono text-ink">▼ n</code> for dropped (danger), a small blue dot for held. Color carries the meaning so the row scans at a glance.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">admin tag —</span> small mono pill in <code className="font-mono text-ink">brand-soft</code>, only on leagues the user commissions. Sits next to the name so it's scannable.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">delete —</span> trash icon button only on admin rows. Tapping opens a bottom-sheet confirm with the league name in the title — destructive copy in the body, generic label on the button.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">try it —</span> tap a trash icon to confirm-delete.</p>
            </div>

            <div className="border-t border-line pt-5">
              <div className="font-mono text-eyebrow uppercase text-ink-muted tracking-widest mb-2">RN parity</div>
              <ul className="text-sm text-ink-muted space-y-1 font-mono">
                <li><code className="text-ink">Screen</code> · <span className="text-ink-dim">no footer, scroll=false</span></li>
                <li><code className="text-ink">Pressable</code> · <span className="text-ink-dim">league row (whole row tappable)</span></li>
                <li><code className="text-ink">Button</code> · <span className="text-ink-dim">primary, secondary, danger, ghost</span></li>
                <li><code className="text-ink">Modal</code> · <span className="text-ink-dim">delete confirm (transparent, animationType="fade")</span></li>
              </ul>
            </div>
          </aside>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
