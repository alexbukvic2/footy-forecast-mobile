<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footy Forecast — Menu (bottom tab bar)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0E0B09',
            surface: { DEFAULT: '#181311', raised: '#231B17', sunken: '#0E0B09' },
            ink:     { DEFAULT: '#F5E8D2', muted: 'rgba(245,232,210,0.55)', dim: 'rgba(245,232,210,0.35)', invert: '#1A0E08' },
            line:    { DEFAULT: 'rgba(245,232,210,0.08)', strong: 'rgba(245,232,210,0.16)' },
            brand: {
              50:'#FBEDE5',100:'#F4D3C0',200:'#EDB497',300:'#E4906A',400:'#DC7B4F',
              500:'#D86B3D',600:'#B85530',700:'#8F4124',800:'#5F2B18',900:'#3B1A0E',
              soft: 'rgba(216,107,61,0.14)',
            },
            success: '#7FB069', warning: '#E8A14B', danger: '#D84A4A',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
          },
          fontSize: {
            eyebrow: ['10.5px', { lineHeight: '14px', letterSpacing: '1.6px' }],
            'hud-md': ['28px', { lineHeight: '30px', letterSpacing: '-0.6px' }],
            'hud-lg': ['40px', { lineHeight: '42px', letterSpacing: '-1.2px' }],
            'hud-xl': ['56px', { lineHeight: '56px', letterSpacing: '-2px' }],
          },
          borderRadius: { card: '18px', tab: '22px', pill: '999px' },
          spacing: { 'screen-x':'20px', 'screen-top':'54px', 'tab-h':'64px' },
          boxShadow: {
            card: '0 18px 40px rgba(0,0,0,0.45)',
            'card-sm': '0 8px 18px rgba(0,0,0,0.35)',
            'tab':     '0 12px 28px rgba(0,0,0,0.55)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #0E0B09; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #F5E8D2; }

    /* iPhone-ish bezel (matches Sign In.html / Leagues.html) */
    .bezel {
      width: 392px;
      height: 850px;
      border-radius: 56px;
      padding: 12px;
      background: #1a1a1a;
      box-shadow:
        inset 0 0 0 2px #2a2a2a,
        0 30px 80px rgba(0,0,0,0.6);
      position: relative;
    }
    .bezel::after {
      content: '';
      position: absolute;
      top: 18px; left: 50%;
      width: 110px; height: 30px;
      background: #000;
      border-radius: 20px;
      transform: translateX(-50%);
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 44px;
      background: #0E0B09;
      overflow: hidden;
      position: relative;
    }
    .screen-content { padding-top: 54px; }

    /* Tab press */
    .tab-btn { transition: transform 80ms ease; }
    .tab-btn:active { transform: scale(0.96); }

    /* Subtle pill activation animation on the icon backplate */
    @keyframes pillIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .pill-active { animation: pillIn 180ms cubic-bezier(0.2, 0.7, 0.2, 1); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div style="padding: 80px 24px; color: rgba(245,232,210,0.55); font-family: 'JetBrains Mono', monospace; font-size: 12px;">Loading…</div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ── Icons (lucide-react paths, hand-inlined for the HTML preview) ────
    // The RN reference imports these directly from lucide-react-native.
    const UserIcon = ({ size = 22, strokeWidth = 1.7 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth={strokeWidth}
           strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    );

    const TrophyIcon = ({ size = 22, strokeWidth = 1.7 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth={strokeWidth}
           strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
    );

    // ── Tab definitions ─────────────────────────────────────────────────
    // Two tabs for now. Adding a third (e.g. Today's matches) is a one-line
    // change to this array; the bar's grid auto-distributes them.
    const TABS = [
      { id: 'profile', label: 'Profile', Icon: UserIcon   },
      { id: 'leagues', label: 'Leagues', Icon: TrophyIcon },
    ];

    // ── TabBar ──────────────────────────────────────────────────────────
    /**
     * Floating bottom tab bar. Sits above the home indicator, not edge-to-
     * edge: a floating pill reads as overlay chrome rather than chrome that
     * fights the content beneath it. The active pill behind the icon (Material-
     * 3 style) is the loudest cue; color shift on icon + label is the second.
     *
     * Layout knobs:
     *   - Bar height       64px (tab-h token)
     *   - Active backplate 40×24 rounded-full, brand-soft fill
     *   - Icon size        22px, strokeWidth 1.7 → 2.1 on active
     *   - Label            mono uppercase, 10.5px (eyebrow scale)
     */
    const TabBar = ({ active, onChange }) => (
      <div className="absolute left-0 right-0 bottom-3 px-3 z-30">
        <div className="rounded-tab bg-surface-raised border border-line shadow-tab
                        h-[64px] grid"
             style={{ gridTemplateColumns: `repeat(${TABS.length}, minmax(0, 1fr))` }}>
          {TABS.map(({ id, label, Icon }) => {
            const isActive = id === active;
            return (
              <button
                key={id}
                type="button"
                onClick={() => onChange(id)}
                aria-label={label}
                aria-current={isActive ? 'page' : undefined}
                className="tab-btn flex flex-col items-center justify-center gap-1 outline-none"
              >
                {/* Icon + active backplate */}
                <div className="relative w-10 h-6 flex items-center justify-center">
                  {isActive ? (
                    <span className="pill-active absolute inset-0 rounded-pill bg-brand-soft" />
                  ) : null}
                  <span className={`relative ${isActive ? 'text-brand-500' : 'text-ink-muted'}`}>
                    <Icon size={20} strokeWidth={isActive ? 2.1 : 1.7} />
                  </span>
                </div>

                {/* Label */}
                <span className={`font-mono uppercase tracking-[0.18em] text-[10px] leading-none
                                  ${isActive ? 'text-brand-500' : 'text-ink-muted'}`}>
                  {label}
                </span>
              </button>
            );
          })}
        </div>
      </div>
    );

    // ── Placeholder screen content (per-tab) ────────────────────────────
    // Just enough to demo what the bar overlays — not the real screens.
    const PlaceholderScreen = ({ tabId }) => {
      const meta = TABS.find((t) => t.id === tabId) ?? TABS[0];
      return (
        <div className="screen">
          <div className="screen-content h-full flex flex-col">
            {/* Top */}
            <div className="px-5 pt-3 flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="w-[26px] h-[26px] rounded-card bg-brand-500 grid place-items-center">
                  <span className="font-display font-bold text-ink-invert text-[11px]">FF</span>
                </div>
                <div className="flex flex-col leading-[1.05]">
                  <span className="font-display font-bold tracking-tight text-[11px]">Footy Forecast</span>
                  <span className="font-mono uppercase text-ink-dim tracking-[0.18em] text-[9px]">
                    World Cup '26 · beta
                  </span>
                </div>
              </div>
            </div>

            {/* Stand-in body so the tab bar has something to float over. */}
            <div className="flex-1 px-6 pt-9 pb-28">
              <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest">
                {meta.label.toUpperCase()}
              </div>
              <div className="mt-2 font-mono text-ink-dim text-[11px] tracking-widest">
                screen content
              </div>

              {/* Ghost lines so the bar floats over something */}
              <div className="mt-7 space-y-2.5">
                {Array.from({ length: 7 }).map((_, i) => (
                  <div key={i} className="rounded-card border border-line bg-surface/40 h-14" />
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [active, setActive] = useState('leagues');

      return (
        <div className="min-h-screen flex items-start justify-center px-10 py-16 gap-12 flex-wrap">
          <div className="bezel">
            <div className="screen relative">
              <PlaceholderScreen tabId={active} />
              <TabBar active={active} onChange={setActive} />
            </div>
          </div>

          <aside className="max-w-sm space-y-6 mt-2">
            <div>
              <div className="font-mono text-eyebrow uppercase text-brand-500 tracking-widest mb-2">
                menu · bottom tab bar
              </div>
              <p className="text-ink-muted text-sm leading-relaxed">
                Floating two-tab bar that sits above the home indicator on
                every authed screen. Profile + Leagues for now; adding a
                third tab (e.g. Today's matches) is a one-line change to the
                <code className="font-mono text-ink"> TABS</code> array.
                Active state lights up a brand-soft pill behind the icon and
                shifts both icon and label to <code className="font-mono text-ink">brand-500</code>.
              </p>
            </div>

            <div className="border-t border-line pt-5 space-y-3 text-sm text-ink-muted leading-relaxed">
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">layout —</span> floating, not edge-to-edge. <code className="font-mono text-ink">mx-3 mb-3</code>, <code className="font-mono text-ink">rounded-tab</code> (22px), <code className="font-mono text-ink">shadow-tab</code>. Reads as overlay chrome, not chrome that fights the content scrolling beneath it.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">active cue —</span> Material-3-style pill: small <code className="font-mono text-ink">brand-soft</code> backplate (40×24, rounded-full) behind the active icon. Color shift on icon + label is the second cue; either alone would do, both together makes it pre-cognitive.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">labels —</span> mono uppercase at <code className="font-mono text-ink">10.5px</code> (eyebrow scale), tracking <code className="font-mono text-ink">0.18em</code>. Matches the eyebrow/admin-tag/wordmark-subtitle voice the rest of the app uses for taxonomy labels.</p>
              <p><span className="font-mono text-brand-500 text-xs uppercase tracking-widest">try it —</span> tap each tab to flip the active state. The placeholder behind the bar swaps with it so you can see the bar against different content.</p>
            </div>

            <div className="border-t border-line pt-5">
              <div className="font-mono text-eyebrow uppercase text-ink-muted tracking-widest mb-2">RN parity</div>
              <ul className="text-sm text-ink-muted space-y-1 font-mono">
                <li><code className="text-ink">expo-router</code> · <span className="text-ink-dim">Tabs layout in <code className="text-ink">app/(tabs)/_layout.tsx</code></span></li>
                <li><code className="text-ink">tabBar</code> · <span className="text-ink-dim">custom render prop → <code className="text-ink">&lt;TabBar /&gt;</code></span></li>
                <li><code className="text-ink">Pressable</code> · <span className="text-ink-dim">per-tab button (whole column tappable)</span></li>
                <li><code className="text-ink">lucide-react-native</code> · <span className="text-ink-dim">User, Trophy</span></li>
              </ul>
            </div>
          </aside>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
